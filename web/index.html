<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>Pokémon Lookalike</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }
    .card {
      margin: 20px;
      border: 1px solid #ccc;
      padding: 15px;
      max-width: 320px;
    }
  </style>
</head>
<body>

<h2>얼굴 사진 업로드</h2>

<input type="file" id="file">
<button onclick="upload()">매칭</button>

<hr>

<div id="results"></div>

<script>
  async function upload() {
    const fileInput = document.getElementById("file");
  
    if (!fileInput.files.length) {
      alert("사진을 선택하세요");
      return;
    }
  
    const form = new FormData();
    form.append("file", fileInput.files[0]);
  
    const div = document.getElementById("results");
    div.innerHTML = "<p>분석 중...</p>";
  
    try {
      const res = await fetch("/match", {
        method: "POST",
        body: form
      });
  
      if (!res.ok) {
        const errorText = await res.text();
        throw new Error(
          `서버 오류 ${res.status}: ${errorText}`
        );
      }
  
      const data = await res.json();
      div.innerHTML = "";
  
      data.results.forEach((r, index) => {
        const summary = Array.isArray(r.explanation?.summary)
          ? r.explanation.summary
          : [];
  
        const reasonHtml = summary.length
          ? summary.map((text) => `<li>${text}</li>`).join("")
          : "<li>세부 설명 없음</li>";
  
        div.innerHTML += `
          <div class="card">
            <h3>${index + 1}. ${r.name}</h3>
  
            <p>
              <b>최종 유사도:</b>
              ${Number(r.final).toFixed(3)}
            </p>
  
            <p>
              <b>얼굴 구조:</b>
              ${Number(r.geo).toFixed(3)}
            </p>
  
            <p>
              <b>시각적 인상:</b>
              ${Number(r.clip).toFixed(3)}
            </p>
  
            <p>
              <b>표정·성격 인상:</b>
              ${Number(r.personality ?? 0).toFixed(3)}
            </p>
  
            <p><b>닮은 이유:</b></p>
            <ul>${reasonHtml}</ul>
          </div>
        `;
      });
  
    } catch (error) {
      div.innerHTML = `
        <p style="color:red;">
          매칭 중 오류가 발생했습니다:
          ${error.message}
        </p>
      `;
    }
  }
  </script>

</body>
</html>
